# 危险配置：pr-description-injection.yml
name: PR Description Job
on:
  pull_request:
    types: [opened, edited]  # 监听PR创建/编辑事件

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use PR title in command
        run: |
          # 直接使用PR标题（用户可控）
          pr_title="${{ github.event.pull_request.title }}"
          echo $pr_title
